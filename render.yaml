services:
  - type: web
    name: hexscrum-converter-api
    runtime: docker
    rootDir: converter-api
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: cloudinary
      - key: LOCAL_UPLOAD_DIR
        value: /app/uploaded-files
      - key: CLOUDINARY_FOLDER
        value: hexscrum-workspace
      - key: MAX_UPLOAD_MB
        value: 25
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERTIFICATE
        sync: false
      - key: AGORA_RTM_TOKEN_TTL_SECONDS
        value: "3600"
